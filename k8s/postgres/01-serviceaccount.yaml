# postgres: identity used by the Postgres Deployment to authenticate to
# Vault's Kubernetes auth method (role "postgres", see
# vault/terraform/kubernetes-auth.tf). No RBAC permissions of its own.
#
# NOTE: the cluster-wide token-reviewer identity Vault uses to validate this
# SA's JWT already exists — it's the `vault-auth` ServiceAccount created in
# the vault-demo namespace by vault/k8s-auth-setup.sh, bound to
# system:auth-delegator via ClusterRoleBinding. That binding is cluster-wide,
# so it covers logins from any namespace and does not need to be duplicated
# here.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres
  namespace: postgres
