# Replaces the named volume `postgresql_data` from docker-compose.yaml.
# Uses the cluster's default StorageClass (local-path, WaitForFirstConsumer).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
