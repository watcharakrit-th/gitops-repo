apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: postgres
  labels:
    app: postgres
spec:
  replicas: 1
  # Recreate, not RollingUpdate: the PVC is ReadWriteOnce, so two pods can't
  # mount it at once during a rolling update.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      serviceAccountName: postgres
      securityContext:
        runAsNonRoot: true
        # Matches the postgres:17 image's built-in `postgres` user/group.
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:17
          # POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB come straight
          # from the VSO-synced Secret — keys match the image's own env
          # vars 1:1 (see vault/terraform/secrets.tf: postgres_sonar).
          envFrom:
            - secretRef:
                name: postgres-db
          env:
            # Subdirectory, not the mount root — avoids the well-known
            # "initdb: directory ... exists but is not empty" issue some
            # CSI/hostPath provisioners trigger with metadata in the mount
            # root (e.g. lost+found).
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "pg_isready -d \"$POSTGRES_DB\" -U \"$POSTGRES_USER\""
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "pg_isready -d \"$POSTGRES_DB\" -U \"$POSTGRES_USER\""
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            capabilities:
              drop: ["ALL"]
            # NOT readOnlyRootFilesystem: the upstream image writes outside
            # the data dir too (/var/run/postgresql socket dir, /tmp, conf
            # files under /var/lib/postgresql/data itself). Unlike the
            # trivial alpine container in vault-demo, locking the rootfs
            # down here isn't worth the boot-failure risk for a stock image.
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
