# sonarqube: identity used by the SonarQube Deployment to authenticate to
# Vault's Kubernetes auth method (role "sonarqube"). No RBAC permissions of
# its own. See k8s/postgres/01-serviceaccount.yaml for why no per-namespace
# token-reviewer ServiceAccount is needed here.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sonarqube
  namespace: sonarqube
