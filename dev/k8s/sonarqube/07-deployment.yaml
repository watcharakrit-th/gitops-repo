# Elasticsearch (embedded) needs vm.max_map_count >= 262144 on the NODE
# (k8s has no per-pod sysctl for this under a restricted PSA namespace — it's
# a kernel-wide setting). Already set on this lab's kind nodes; if you
# recreate the cluster, set it on each node before deploying:
#   docker exec <node> sysctl -w vm.max_map_count=262144
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarqube
  namespace: sonarqube
  labels:
    app: sonarqube
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sonarqube
  template:
    metadata:
      labels:
        app: sonarqube
    spec:
      serviceAccountName: sonarqube
      securityContext:
        runAsNonRoot: true
        # Matches the sonarqube:community image's built-in `sonarqube` user.
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      # Translates compose's `depends_on: db: condition: service_healthy`
      # into a k8s-native wait loop, since Deployments have no equivalent.
      initContainers:
        - name: wait-for-postgres
          image: postgres:17
          command:
            - sh
            - -c
            - |
              # -U/-d don't need to be the real credentials — pg_isready just
              # opens a connection and checks the server's response, it
              # never authenticates. Without them it falls back to resolving
              # a local OS username that doesn't exist in this minimal
              # image, which fails client-side before any network attempt
              # (pg_isready exit 3, "no attempt").
              until pg_isready -h postgres.postgres.svc.cluster.local -p 5432 -U postgres -d postgres; do
                echo "waiting for postgres..."
                sleep 3
              done
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            privileged: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
      containers:
        - name: sonarqube
          image: sonarqube:community
          # SONAR_JDBC_URL / SONAR_JDBC_USERNAME / SONAR_JDBC_PASSWORD come
          # straight from the VSO-synced Secret (see
          # vault/terraform/secrets.tf: sonarqube_db).
          envFrom:
            - secretRef:
                name: sonarqube-db
          ports:
            - name: http
              containerPort: 9000
          # Same check as the compose healthcheck: poll the status API until
          # it reports UP. Split across startup/readiness/liveness so the
          # ~5 minute cold-boot window (Elasticsearch + web + compute engine)
          # doesn't trip liveness restarts once it's actually up.
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - "curl -s http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "curl -s http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "curl -s http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"
            periodSeconds: 15
            failureThreshold: 5
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            capabilities:
              drop: ["ALL"]
            # NOT readOnlyRootFilesystem — see postgres Deployment comment;
            # the entrypoint renders config/JVM files under $SONARQUBE_HOME
            # at boot beyond the three mounted data dirs below.
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          volumeMounts:
            - name: data
              mountPath: /opt/sonarqube/data
            - name: extensions
              mountPath: /opt/sonarqube/extensions
            - name: logs
              mountPath: /opt/sonarqube/logs
            - name: temp
              mountPath: /opt/sonarqube/temp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: sonarqube-data
        - name: extensions
          persistentVolumeClaim:
            claimName: sonarqube-extensions
        - name: logs
          persistentVolumeClaim:
            claimName: sonarqube-logs
        - name: temp
          emptyDir: {}
