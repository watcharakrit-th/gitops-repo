apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: sonarqube-db
  namespace: sonarqube
spec:
  vaultAuthRef: vault-auth
  mount: secret
  type: kv-v2
  path: sonarqube/db
  destination:
    name: sonarqube-db
    create: true
  refreshAfter: 1h
# NOTE: secret/sonarqube/admin (UI admin password, rotate-after-first-login)
# is intentionally NOT synced here. SonarQube Community Edition has no env
# var to set the initial admin password — it always boots with the
# admin/admin default and forces a change on first UI login, so there's
# nothing for a container to consume. The Vault path still exists for
# whoever manually rotates it after first login (see terraform/README.md).
