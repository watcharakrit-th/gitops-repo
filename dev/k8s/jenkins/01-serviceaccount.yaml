# jenkins: identity used by the Jenkins Deployment to authenticate to
# Vault's Kubernetes auth method (role "jenkins"), and to the Kubernetes API
# (via 09-rbac.yaml) so the Kubernetes-plugin Cloud config in casc.yaml can
# provision build-agent Pods. See gitops-repo/dev/k8s/postgres/01-serviceaccount.yaml for why
# no per-namespace token-reviewer ServiceAccount is needed here.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins
  namespace: jenkins
