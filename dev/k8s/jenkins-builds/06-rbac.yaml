# Mirrors k8s/jenkins/09-rbac.yaml's grant, but in this namespace, so the
# Kubernetes-plugin Cloud (casc.yaml) can also provision the "kaniko" pod
# template here — the subject is the controller's own ServiceAccount from
# the jenkins namespace (cross-namespace subject reference), not a
# ServiceAccount local to jenkins-builds.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jenkins-agent-pods
  namespace: jenkins-builds
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jenkins-agent-pods
  namespace: jenkins-builds
subjects:
  - kind: ServiceAccount
    name: jenkins
    namespace: jenkins
roleRef:
  kind: Role
  name: jenkins-agent-pods
  apiGroup: rbac.authorization.k8s.io
