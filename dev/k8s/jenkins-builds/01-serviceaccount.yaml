# Identity for the Kaniko build agent pods (casc.yaml's "kaniko" pod
# template sets serviceAccount: jenkins-builds). No RBAC permissions of its
# own — kept separate from the jenkins controller's own ServiceAccount (which
# carries pod-management RBAC, see gitops-repo/dev/k8s/jenkins/09-rbac.yaml) so a disposable
# build pod never carries that power. See gitops-repo/dev/k8s/postgres/01-serviceaccount.yaml
# for why no per-namespace token-reviewer ServiceAccount is needed here.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins-builds
  namespace: jenkins-builds
