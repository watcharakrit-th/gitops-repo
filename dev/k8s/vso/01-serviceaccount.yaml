# demo-app: identity used by the demo Deployment to authenticate to Vault's
# Kubernetes auth method (role "demo-app", see
# terraform/kubernetes-auth.tf). No RBAC permissions of its own.
#
# NOTE: the cluster-wide token-reviewer identity Vault uses to validate this
# SA's JWT already exists — it's the `vault-auth` ServiceAccount created in
# the vault-auth-system namespace by terraform/01-serviceaccounts.yaml, bound
# to system:auth-delegator via ClusterRoleBinding. That binding is
# cluster-wide, so it covers logins from any namespace and does not need to
# be duplicated here.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-app
  namespace: vault-demo
