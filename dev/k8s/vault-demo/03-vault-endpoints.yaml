# Vault runs as a Docker container bridged onto the `kind` network at a
# static IP (172.18.0.200), not as a pod in this cluster. This headless
# Service + manual Endpoints object gives in-cluster pods a stable DNS name
# (vault.vault-demo.svc.cluster.local) that resolves to it.
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: vault-demo
spec:
  clusterIP: None
  ports:
    - name: http
      port: 8200
      targetPort: 8200
---
apiVersion: v1
kind: Endpoints
metadata:
  name: vault
  namespace: vault-demo
subsets:
  - addresses:
      - ip: 172.18.0.200
    ports:
      - name: http
        port: 8200
