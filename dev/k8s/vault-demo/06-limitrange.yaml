# Safety net: every container in vault-demo gets default requests/limits even
# if a manifest forgets to set them. The demo Deployment also sets its own
# limits explicitly — this just ensures the namespace can't host an
# unconstrained pod.
apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  namespace: vault-demo
spec:
  limits:
    - type: Container
      default:
        cpu: "200m"
        memory: "128Mi"
      defaultRequest:
        cpu: "50m"
        memory: "64Mi"
      max:
        cpu: "500m"
        memory: "256Mi"
      min:
        cpu: "10m"
        memory: "16Mi"
