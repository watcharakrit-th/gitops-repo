apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: vault-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      serviceAccountName: demo-app
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: demo-app
          image: alpine:3.20
          command:
            - sh
            - -c
            - |
              while true; do
                echo "[$(date -u +%FT%TZ)] db_username=${db_username} db_password=${db_password}"
                sleep 30
              done
          envFrom:
            - secretRef:
                name: app-config
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            privileged: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
