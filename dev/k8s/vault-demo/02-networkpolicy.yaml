# Default-deny everything in/out of vault-demo, then explicitly allow only
# the flows the demo app needs: DNS resolution and talking to Vault.
#
# CAVEAT: kindnet (the default CNI on this "lab" cluster) does NOT enforce
# NetworkPolicy. These manifests are still applied as best-practice/portable
# policy — they will start being enforced automatically if this cluster is
# ever recreated with a policy-capable CNI (Calico, Cilium, etc.). See
# README_K8S_CHEATSHEET.md for details.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: vault-demo
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: vault-demo
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-vault-egress
  namespace: vault-demo
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # Vault runs outside the cluster (Docker container bridged onto the
    # `kind` network at a static IP) — the in-namespace "vault" Service/
    # Endpoints object just points at this address, so the policy targets
    # the IP directly rather than a podSelector.
    - to:
        - ipBlock:
            cidr: 172.18.0.200/32
      ports:
        - protocol: TCP
          port: 8200
