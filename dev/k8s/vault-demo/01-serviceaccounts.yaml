# demo-app: identity used by the demo Deployment to authenticate to Vault's
# Kubernetes auth method. No RBAC permissions of its own.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-app
  namespace: vault-demo
---
# vault-auth: Vault's "token reviewer" identity. Vault uses this SA's token
# to call the Kubernetes TokenReview API and verify SA JWTs presented by
# pods during login.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-auth
  namespace: vault-demo
---
# Long-lived token Secret for vault-auth (1.24+ no longer auto-creates these).
apiVersion: v1
kind: Secret
metadata:
  name: vault-auth-token
  namespace: vault-demo
  annotations:
    kubernetes.io/service-account.name: vault-auth
type: kubernetes.io/service-account-token
---
# Grants vault-auth permission to create TokenReview requests — the minimum
# needed for Vault's Kubernetes auth method to validate SA JWTs.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-auth-token-reviewer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: vault-auth
    namespace: vault-demo
