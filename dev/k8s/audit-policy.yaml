# API server audit policy.
# - Secrets/ConfigMaps: log full request+response (these are the most
#   sensitive resources — useful for spotting who read/wrote what).
# - Everything else: log metadata only (who/what/when, no payload bodies).
apiVersion: audit.k8s.io/v1
kind: Policy
omitStages:
  - "RequestReceived"
rules:
  - level: RequestResponse
    resources:
      - group: ""
        resources: ["secrets", "configmaps"]
  - level: Metadata
